<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #080808;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(118,185,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(118,185,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Glow */
    body::after {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(118,185,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0 80px;
      width: 100%;
    }

    .logo {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: -2px;
      color: #76b900;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
      max-width: 700px;
    }

    .sub {
      font-size: 18px;
      color: #737373;
      margin-bottom: 40px;
    }

    .pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(118,185,0,0.1);
      border: 1px solid rgba(118,185,0,0.25);
      color: #76b900;
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 14px;
      font-weight: 600;
    }

    .badge {
      position: absolute;
      bottom: 40px;
      right: 80px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #525252;
    }

    .nvidia-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #76b900;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">mocki</div>
    <div class="tagline">AI mock interviews with a real<br/>3-person panel that adapts to you</div>
    <div class="sub">Upload your resume. Get grilled. Get better.</div>
    <div class="pills">
      <span class="pill">Adaptive Panel</span>
      <span class="pill">Voice Interviews</span>
      <span class="pill">Full Debrief</span>
      <span class="pill">Panel Memory</span>
      <span class="pill">Free</span>
    </div>
  </div>
  <div class="badge">
    <div class="nvidia-dot"></div>
    Powered by NVIDIA Nemotron
  </div>
</body>
</html>
